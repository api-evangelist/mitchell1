name: Mitchell 1
kind: company
description: >-
  Mitchell 1 is a division of Snap-on Incorporated providing repair
  information (ProDemand, TruckSeries) and shop management software (Manager
  SE, SocialCRM) to independent auto repair shops. Mitchell 1 is a legacy
  enterprise software provider, not an API-first company - it has no public,
  self-serve REST API reference. It does operate a gated Web-Intent / Data API
  integration program for approved third-party partners (shop management
  systems, CRM, parts and marketing platforms) to embed or link into ProDemand
  labor, parts, and maintenance data, fronted by a token-based (TAPE) auth flow
  and an Intent Registry discovery service. Access requires submitting an
  integration request, a Mitchell 1 review (roughly two weeks), and a signed
  partner agreement; no public API reference, OpenAPI document, or SDK is
  published. Note - Mitchell 1 (mitchell1.com, Snap-on) is a distinct company
  from Mitchell International (mitchell.com, part of Enlyte) - the two share a
  historical "Mitchell" lineage but are separately owned; Mitchell
  International's public developer.mitchell.com RepairCenter API belongs to
  the other company and is out of scope here.
